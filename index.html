<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#09132a;--navy2:#0d1b38;--navy3:#112040;
  --card:#132248;--border:rgba(255,255,255,0.08);
  --accent:#00c4b4;--gold:#c9a84c;--white:#f0f6ff;--muted:#7a8fad;
  --red:#e74c3c;--blue:#4ea8de;--pink:#f48fb1;
}
html,body{min-height:100vh;background:var(--navy);color:var(--white);font-family:'DM Sans',sans-serif}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.header{background:linear-gradient(180deg,#0a1628 0%,var(--navy) 100%);padding:40px 48px 32px;text-align:center;border-bottom:1px solid var(--border)}
.header-badge{display:inline-block;border:1px solid var(--accent);border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);padding:4px 14px;margin-bottom:16px;text-transform:uppercase}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,50px);font-weight:700;line-height:1.1;margin-bottom:8px}
.header h1 em{color:var(--accent);font-style:normal}
.header p{color:var(--muted);font-size:13px}
.stats{display:flex;justify-content:center;gap:48px;padding:20px 48px;background:rgba(0,0,0,0.22);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.app-layout{display:flex;align-items:flex-start;max-width:1380px;margin:0 auto;padding:24px 36px 60px;gap:20px}
.sidebar{width:230px;flex-shrink:0;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.clinic-list{display:flex;flex-direction:column}
.clinic-btn{width:100%;height:44px;padding:0 14px;background:transparent;border:none;border-left:3px solid transparent;color:var(--muted);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;text-align:left;position:relative}
.clinic-btn:hover{background:rgba(0,196,180,0.06);color:var(--white)}
.clinic-btn.active{background:rgba(0,196,180,0.08);border-left-color:var(--accent);color:var(--accent);font-weight:600}
.clinic-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-badge{background:rgba(0,196,180,0.1);border:1px solid rgba(0,196,180,0.2);color:var(--accent);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;flex-shrink:0}
.clinic-btn.stopped{opacity:0.45}
.stopped-tag{font-size:7px;font-weight:700;letter-spacing:1px;background:#c0392b;color:#fff;padding:1px 4px;border-radius:3px;flex-shrink:0;text-transform:uppercase}
.clinic-divider{height:1px;background:var(--border);margin:6px 0}
.panel-wrap{flex:1;min-width:0}
.panel-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.panel-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.panel-meta{font-size:12px;color:var(--muted);margin-top:4px}
.panel-meta span{color:var(--accent)}
.panel-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.panel-search{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;outline:2px solid transparent;transition:border .2s;width:200px}
.panel-search:focus{border-color:var(--accent);outline:2px solid transparent}
.panel-search::placeholder{color:var(--muted)}
.btn-dl-all{background:var(--accent);color:#09132a;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-dl-all:hover{opacity:0.85}
.section-header{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
.section-title{font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.section-title.family{color:var(--accent)}
.section-title.specialist{color:var(--gold)}
.section-line{flex:1;height:1px;background:var(--border)}
.section-count{font-size:11px;color:var(--muted);white-space:nowrap;background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:10px}
.doctors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.doctor-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;position:relative}
.doctor-card:hover{border-color:rgba(0,196,180,0.3);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.doctor-card.hidden{display:none}
.doctor-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.drop-zone{position:absolute;inset:0;z-index:50;border-radius:12px;background:rgba(0,196,180,0.15);border:2px dashed var(--accent);display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;pointer-events:none}
.doctor-card.drag-over .drop-zone{display:flex}
.drop-zone-icon{font-size:28px}
.drop-zone-label{font-size:12px;font-weight:600;color:var(--accent)}
.gallery-wrap{position:relative;width:100%;height:200px;background:var(--navy2);overflow:hidden}
.gallery-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.gallery-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);color:var(--white);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;color:var(--white);width:28px;height:28px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.gallery-nav:hover{background:rgba(0,0,0,0.8)}
.gallery-nav.prev{left:8px}
.gallery-nav.next{right:8px}
.gallery-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted)}
.gallery-empty svg{opacity:0.4}
.gallery-empty span{font-size:12px}
.awaiting-badge{position:absolute;top:10px;left:10px;background:#c9a84c22;border:1px solid var(--gold);color:var(--gold);font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.silhouette-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.silhouette-img{height:100%;object-fit:cover;object-position:top;opacity:0.5;filter:grayscale(1)}
.privacy-badge{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
.thumb-strip{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--navy2);min-height:52px;max-height:62px;align-items:center;scrollbar-width:thin}
.thumb{width:38px;height:38px;border-radius:6px;object-fit:cover;object-position:top;cursor:pointer;border:2px solid transparent;opacity:0.6;transition:all .15s;flex-shrink:0}
.thumb.active{border-color:var(--accent);opacity:1}
.thumb-add{width:38px;height:38px;border-radius:6px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0;background:transparent;position:relative;overflow:hidden}
.thumb-add:hover{border-color:var(--accent);color:var(--accent)}
.thumb-add input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.card-body{padding:12px 14px 8px}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--border);transition:background .2s}
.gender-dot.male{background:var(--blue)}
.gender-dot.female{background:var(--pink)}
.doctor-name{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gender-select{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--navy3);color:var(--muted);cursor:pointer;outline:2px solid transparent;transition:all .2s;flex-shrink:0}
.gender-select:hover,.gender-select:focus{border-color:var(--accent);color:var(--white);outline:2px solid transparent}
.gender-select.male{border-color:#4ea8de44;color:var(--blue)}
.gender-select.female{border-color:#f48fb144;color:var(--pink)}
.specialty-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:3px 10px;border-radius:10px;margin-bottom:4px}
.specialty-tag.family{background:rgba(0,196,180,0.1);color:var(--accent);border:1px solid rgba(0,196,180,0.2)}
.specialty-tag.specialist{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px}
.btn{font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--navy3);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap}
.btn:hover{color:var(--white);border-color:rgba(255,255,255,0.2)}
.btn.primary{background:rgba(0,196,180,0.1);border-color:rgba(0,196,180,0.3);color:var(--accent)}
.btn.danger{background:rgba(231,76,60,0.08);border-color:rgba(231,76,60,0.2);color:var(--red)}
.btn-upload-doc{position:relative;overflow:hidden;width:calc(100% - 28px);margin:0 14px 8px;border:1px dashed var(--border);background:transparent;font-size:11px;color:var(--muted);border-radius:7px;padding:6px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .2s}
.btn-upload-doc:hover{border-color:var(--accent);color:var(--accent)}
.btn-upload-doc input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.docs-list{list-style:none;padding:0 14px 6px}
.doc-item{display:flex;align-items:center;gap:6px;font-size:11.5px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:5px 9px;margin-bottom:4px}
.doc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--white)}
.doc-dl{background:none;border:none;cursor:pointer;color:var(--accent);font-size:11px;padding:2px 5px;border-radius:4px;font-weight:600}
.doc-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;padding:2px 5px;border-radius:4px;opacity:0.7}
.doc-del:hover{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.lightbox.open{display:flex}
.lb-img{max-width:90vw;max-height:70vh;border-radius:8px;object-fit:contain}
.lb-controls{display:flex;align-items:center;gap:16px}
.lb-btn{background:var(--card);border:1px solid var(--border);color:var(--white);width:40px;height:40px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.lb-btn:hover{background:var(--navy3)}
.lb-counter{font-size:13px;color:var(--muted);min-width:50px;text-align:center}
.lb-strip{display:flex;gap:8px;overflow-x:auto;max-width:80vw;padding:4px;scrollbar-width:thin}
.lb-thumb{width:52px;height:52px;border-radius:7px;object-fit:cover;object-position:top;cursor:pointer;border:2px solid transparent;opacity:0.6;transition:all .15s;flex-shrink:0}
.lb-thumb.active{border-color:var(--accent);opacity:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy2);color:var(--white);border:1px solid rgba(0,196,180,0.3);border-radius:10px;padding:11px 20px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;white-space:nowrap;transition:transform .3s,opacity .3s;opacity:0;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:9980;
  background:linear-gradient(135deg,#09132a,#112040);
  border-top:1px solid rgba(0,196,180,0.3);
  padding:12px 24px;display:none;align-items:center;justify-content:space-between;gap:12px}
.save-bar.visible{display:flex}
.save-bar-msg{font-size:13px;color:var(--muted)}
.save-bar-msg span{color:var(--accent);font-weight:600}
.save-bar-actions{display:flex;gap:8px}
.btn-save{background:var(--accent);color:#09132a;border:none;border-radius:8px;
  padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-save:hover{opacity:0.85}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-discard{background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;transition:all .2s}
.btn-discard:hover{color:var(--white);border-color:rgba(255,255,255,0.3)}
.sync-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:9990;background:linear-gradient(90deg,transparent,var(--accent),transparent);background-size:200% 100%;animation:syncAnim 1.4s ease infinite}
@keyframes syncAnim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(max-width:900px){.app-layout{padding:16px;gap:14px}.sidebar{width:180px}.doctors-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
@media(max-width:700px){.app-layout{flex-direction:column;padding:12px}.sidebar{width:100%;position:static;max-height:none}.clinic-list{flex-direction:row;flex-wrap:wrap;gap:6px;padding-bottom:8px}.clinic-btn{width:auto;height:32px;padding:0 12px;border-left:none;border-radius:20px;border:1px solid var(--border);font-size:11px;flex-shrink:0}.clinic-btn.active{background:var(--accent);color:#09132a;border-color:var(--accent)}.doc-badge{display:none}.clinic-divider{display:none}.panel-search{width:100%}.doctors-grid{grid-template-columns:1fr 1fr;gap:10px}}
@media(max-width:480px){.header{padding:24px 16px 20px}.doctors-grid{grid-template-columns:1fr}.app-layout{padding:10px}}
</style>
</head>
<body>

// ── STATE
const galleries={}, docFiles={}, genderOv={}, cardIdx={};
let activeClinic=null, lbDocId=null, lbIdx=0;

// ── SUPABASE STORAGE
async function supaUpload(path,file){
  const res=await fetch(SUPA_URL+'/storage/v1/object/'+SUPA_BUCKET+'/'+path,{
    method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
    body:file
  });
  if(!res.ok){
    const t=await res.text();let m=t;try{m=JSON.parse(t).message||t;}catch(e){}
    throw new Error(m);
  }
  return supaSign(path);
}
function supaSign(path){
  return Promise.resolve(SUPA_URL+'/storage/v1/object/public/'+SUPA_BUCKET+'/'+path);
}
async function supaDelete(path){
  // Correct endpoint: DELETE /storage/v1/object/bucket/path
  try {
    const res = await fetch(SUPA_URL+'/storage/v1/object/'+SUPA_BUCKET+'/'+path,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(!res.ok) console.warn('Storage delete failed:',res.status, await res.text());
  } catch(e){ console.warn('supaDelete error:',e); }
}

// ── DB
function dbH(extra){
  return Object.assign({'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},extra||{});
}
async function dbSelect(table,qs){
  const res=await fetch(SUPA_URL+'/rest/v1/'+table+(qs?'?'+qs:''),{headers:dbH()});
  if(!res.ok) throw new Error('DB '+res.status);
  return res.json();
}
async function dbUpsert(table,conflict,row){
  const res=await fetch(SUPA_URL+'/rest/v1/'+table+'?on_conflict='+conflict,{
    method:'POST',
    headers:dbH({'Prefer':'resolution=merge-duplicates,return=representation'}),
    body:JSON.stringify(row)
  });
  if(!res.ok) console.warn('upsert fail',res.status,await res.text());
}
async function dbDelete(table,col,val){
  try {
    const res=await fetch(SUPA_URL+'/rest/v1/'+table+'?'+col+'=eq.'+encodeURIComponent(val),{
      method:'DELETE',headers:dbH()
    });
    if(!res.ok) console.warn('DB delete failed:',res.status,await res.text());
  } catch(e){ console.warn('dbDelete error:',e); }
}

// ── INIT GALLERIES
const DOC_LOC={};
function initGalleries(){
  CLINICS.forEach(function(clinic){
    clinic.sections.forEach(function(sec){
      sec.doctors.forEach(function(doc){
        galleries[doc.id]=[];
        docFiles[doc.id]=[];
        cardIdx[doc.id]=0;
        DOC_LOC[doc.id]={clinicId:clinic.id,secId:sec.sectionId};
        if(SEED_PHOTOS[doc.id]){
          galleries[doc.id]=SEED_PHOTOS[doc.id].map(function(src,i){
            return {src:src,name:doc.name.replace(/[^a-z0-9]/gi,'_')+'_'+(i+1)+'.jpg',user:false};
          });
        } else if(doc.seed&&SEEDS[doc.seed]){
          galleries[doc.id]=[{src:SEEDS[doc.seed],name:doc.name+'_1.jpg',user:false}];
        }
      });
    });
  });
}

// ── LOAD DB
async function loadFromDB(){
  try {
    var results=await Promise.all([
      dbSelect('cd_photos','order=created_at.asc'),
      dbSelect('cd_docs','order=created_at.asc'),
      dbSelect('cd_gender','')
    ]);
    var photos=results[0],docs=results[1],genders=results[2];
    for(var i=0;i<photos.length;i++){
      var r=photos[i];
      if(!galleries[r.doc_id]) continue;
      var exists=galleries[r.doc_id].some(function(p){return p.supaPath===r.supa_path;});
      if(!exists) galleries[r.doc_id].push({src:supaSign(r.supa_path),supaPath:r.supa_path,name:r.name,user:true});
    }
    for(var j=0;j<docs.length;j++){
      var dr=docs[j];
      if(!docFiles[dr.doc_id]) continue;
      var dex=docFiles[dr.doc_id].some(function(d){return d.supaPath===dr.supa_path;});
      if(!dex) docFiles[dr.doc_id].push({name:dr.name,type:dr.file_type,size:dr.file_size,src:supaSign(dr.supa_path),supaPath:dr.supa_path});
    }
    for(var k=0;k<genders.length;k++) genderOv[genders[k].doc_id]=genders[k].gender;
  } catch(err){console.warn('DB load failed:',err);}
}

// ── SAVE / DISCARD
function updateSaveBar(){
  var total=pendingAdds.length+pendingDeletes.length;
  var bar=document.getElementById('saveBar');
  var cnt=document.getElementById('saveCount');
  if(bar) bar.classList.toggle('visible', total>0);
  if(cnt) cnt.textContent=total;
}

async function saveChanges(){
  var btn=document.getElementById('btnSave');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  var ok=0,fail=0;
  // Process adds
  for(var i=0;i<pendingAdds.length;i++){
    var a=pendingAdds[i];
    try{
      var url=await supaUpload(a.path,a.file);
      a.entry.src=url;a.entry.pending=false;
      await dbUpsert('cd_photos','supa_path',{doc_id:a.docId,name:a.file.name,supa_path:a.path,supa_url:url,is_user:true});
      ok++;
    } catch(err){console.error('Save add failed:',err);fail++;}
  }
  // Process deletes
  for(var j=0;j<pendingDeletes.length;j++){
    var d=pendingDeletes[j];
    try{
      await supaDelete(d.supaPath);
      await dbDelete(d.dbTable,'supa_path',d.supaPath);
      ok++;
    } catch(err){console.error('Save delete failed:',err);fail++;}
  }
  pendingAdds.length=0;pendingDeletes.length=0;
  updateSaveBar();
  renderPanel();
  if(btn){btn.disabled=false;btn.textContent='\ud83d\udcbe Save Changes';}
  if(fail>0) showToast('\u26a0\ufe0f '+ok+' saved, '+fail+' failed');
  else showToast('\u2705 All changes saved!');
}

function discardChanges(){
  // Remove pending add previews from galleries
  pendingAdds.forEach(function(a){
    var g=galleries[a.docId];
    if(g){var pi=g.findIndex(function(p){return p.supaPath===a.path;});if(pi!==-1) g.splice(pi,1);}
  });
  // Restore pending deletes back into galleries
  pendingDeletes.forEach(function(d){
    if(d.type==='photo'&&galleries[d.docId]){
      galleries[d.docId].push({src:supaSign(d.supaPath),supaPath:d.supaPath,name:d.name,user:true});
    }
  });
  pendingAdds.length=0;pendingDeletes.length=0;
  updateSaveBar();
  renderPanel();
  showToast('\u21a9\ufe0f Changes discarded');
}

// ── BOOT
async function boot(){
  initGalleries();
  var first=CLINICS.find(function(c){return c.status!=='stopped';});
  if(first) setActiveClinic(first.id); // renderSidebar + renderPanel called inside
  updateStats();

  try{
    await loadFromDB();

}

// ── REFRESH CARD
function refreshCard(docId,clinicId,secId){
  var card=document.getElementById('card_'+docId);
  if(!card) return;
  var clinic=CLINICS.find(function(c){return c.id===clinicId;});
  if(!clinic) return;
  var sec=clinic.sections.find(function(s){return s.sectionId===secId;});
  if(!sec) return;
  var doc=sec.doctors.find(function(d){return d.id===docId;});
  if(!doc) return;
  var tmp=document.createElement('div');
  tmp.innerHTML=cardHTML(doc,clinicId,secId);
  var nc=tmp.querySelector('.doctor-card');
  if(nc) card.replaceWith(nc);
}

// ── ADD PHOTOS
function addMorePhotos(docId){
  var input=document.createElement('input');
  input.type='file';input.accept='image/*';input.multiple=true;
  input.onchange=function(){
    var loc=DOC_LOC[docId]||{clinicId:'',secId:''};
    addPhotos(docId,loc.clinicId,loc.secId,input);
  };
  input.click();
}
async function addPhotos(docId,clinicId,secId,input){
  var files=Array.from(input.files);
  if(!files.length) return;
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var ext=file.name.split('.').pop()||'jpg';
    var path='photos/'+docId+'/'+Date.now()+'_'+i+'.'+ext;
    // Stage locally — show preview immediately via FileReader
    var localUrl=await new Promise(function(res){
      var r=new FileReader();r.onload=function(e){res(e.target.result);};r.readAsDataURL(file);
    });
    var entry={src:localUrl,supaPath:path,name:file.name,user:true,pending:true};
    galleries[docId].push(entry);
    cardIdx[docId]=galleries[docId].length-1;
    pendingAdds.push({docId:docId,file:file,path:path,entry:entry});
  }
  refreshCard(docId,clinicId,secId);
  updateStats();
  updateSaveBar();
  showToast('\ud83d\udccc '+files.length+' photo'+(files.length>1?'s':'')+' staged — click Save to upload');
}
function navCard(docId,dir,clinicId,secId){
  var g=galleries[docId];if(!g||!g.length) return;
  cardIdx[docId]=((cardIdx[docId]||0)+dir+g.length)%g.length;
  refreshCard(docId,clinicId,secId);
}
function setIdx(docId,idx,clinicId,secId){cardIdx[docId]=idx;refreshCard(docId,clinicId,secId);}
function downloadPhoto(docId){
  var g=galleries[docId];if(!g||!g.length) return;
  var p=g[cardIdx[docId]||0];var a=document.createElement('a');a.href=p.src;a.download=p.name;a.click();
}
async function downloadAllPhotos(docId,name){
  var g=galleries[docId];if(!g||!g.length) return;
  showToast('\u2b07\ufe0f Downloading '+g.length+' photos\u2026');
  for(var i=0;i<g.length;i++){
    var a=document.createElement('a');a.href=g[i].src;a.download=g[i].name||(name+'_'+(i+1)+'.jpg');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    await new Promise(function(r){setTimeout(r,400);});
  }
}
async function deletePhoto(docId,clinicId,secId){
  var g=galleries[docId];if(!g||!g.length) return;
  var di=cardIdx[docId]||0;var photo=g[di];
  g.splice(di,1);cardIdx[docId]=Math.max(0,di-1);
  if(photo&&photo.pending){
    // Never saved — remove from pendingAdds only
    var pi=pendingAdds.findIndex(function(p){return p.path===photo.supaPath;});
    if(pi!==-1) pendingAdds.splice(pi,1);
  } else if(photo&&photo.supaPath&&photo.supaPath.indexOf('photos/')===0){
    // Saved photo — stage for deletion on Save
    pendingDeletes.push({type:'photo',supaPath:photo.supaPath,dbTable:'cd_photos',docId:docId,name:photo.name});
  }
  showToast('\ud83d\uddd1\ufe0f Removed — click Save to confirm');
  refreshCard(docId,clinicId,secId);updateStats();updateSaveBar();
}

// ── DOCS
async function addDocs(docId,clinicId,secId,input){
  var files=Array.from(input.files);if(!files.length) return;
  showToast('\u2b06\ufe0f Uploading '+files.length+' doc'+(files.length>1?'s':'')+'\u2026');
  var ok=0;
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var path='docs/'+docId+'/'+Date.now()+'_'+safe;
    try{
      var url=await supaUpload(path,file);
      docFiles[docId].push({name:file.name,type:file.type,size:file.size,src:url,supaPath:path});
      await dbUpsert('cd_docs','supa_path',{doc_id:docId,name:file.name,file_type:file.type,file_size:file.size,supa_path:path,supa_url:url});
      ok++;
    } catch(err){showToast('\u26a0\ufe0f Failed: '+err.message);}
  }
  if(ok>0){showToast('\u2705 '+ok+' doc'+(ok>1?'s':'')+' saved');refreshCard(docId,clinicId,secId);}
}
function deleteDoc(docId,idx,clinicId,secId){
  var docs=docFiles[docId];if(!docs) return;
  var d=docs[idx];docs.splice(idx,1);
  if(d&&d.supaPath){supaDelete(d.supaPath);dbDelete('cd_docs','supa_path',d.supaPath);}
  showToast('\ud83d\uddd1\ufe0f Doc removed');refreshCard(docId,clinicId,secId);
}

function setGender(docId,sel){

// ── FILTER
var _filterTimer=null;
function filterCards(q){
  clearTimeout(_filterTimer);
  _filterTimer=setTimeout(function(){
    var ql=q.toLowerCase().trim();
    var panel=document.getElementById('panelWrap');if(!panel) return;
    panel.querySelectorAll('.doctor-card').forEach(function(card){
      card.classList.toggle('hidden',!!(ql&&card.dataset.name.indexOf(ql)===-1));

// ── DRAG DROP
function dragOver(e,docId){e.preventDefault();e.stopPropagation();var c=document.getElementById('card_'+docId);if(c) c.classList.add('drag-over');}
function dragLeave(e,docId){
  var c=document.getElementById('card_'+docId);if(!c) return;
  var r=c.getBoundingClientRect();
  if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom) return;
  c.classList.remove('drag-over');
}
function onDrop(e,docId,clinicId,secId){
  e.preventDefault();e.stopPropagation();
  var c=document.getElementById('card_'+docId);if(c) c.classList.remove('drag-over');
  var files=Array.from(e.dataTransfer.files);
  var imgs=files.filter(function(f){return f.type.indexOf('image/')===0;});
  var docs=files.filter(function(f){return f.type.indexOf('image/')!==0;});
  if(imgs.length) addPhotos(docId,clinicId,secId,{files:imgs});
  if(docs.length) addDocs(docId,clinicId,secId,{files:docs});
}

// ── DOWNLOAD CLINIC
async function downloadClinic(clinicId){
  var clinic=CLINICS.find(function(c){return c.id===clinicId;});if(!clinic) return;
  var all=[];
  clinic.sections.forEach(function(s){s.doctors.forEach(function(d){(galleries[d.id]||[]).forEach(function(p){all.push(p);});});});
  if(!all.length){showToast('\u26a0\ufe0f No photos in this clinic');return;}
  showToast('\u2b07\ufe0f Downloading '+all.length+' photos\u2026');
  for(var i=0;i<all.length;i++){
    var a=document.createElement('a');a.href=all[i].src;a.download=all[i].name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    await new Promise(function(r){setTimeout(r,400);});
  }
}

// ── LIGHTBOX
function openLb(docId,idx){lbDocId=docId;lbIdx=idx;document.getElementById('lightbox').classList.add('open');renderLb();}
function closeLb(){document.getElementById('lightbox').classList.remove('open');lbDocId=null;}
function renderLb(){
  var g=galleries[lbDocId];if(!g||!g.length) return;
  document.getElementById('lbImg').src=g[lbIdx].src;
  document.getElementById('lbCounter').textContent=(lbIdx+1)+'/'+g.length;
  document.getElementById('lbStrip').innerHTML=g.map(function(p,i){
    return '<img class="lb-thumb'+(i===lbIdx?' active':'')+'" src="'+p.src+'" onclick="lbSetIdx('+i+')" alt="">';
  }).join('');
}
function lbNav(dir){if(!lbDocId) return;var g=galleries[lbDocId];if(!g||!g.length) return;lbIdx=(lbIdx+dir+g.length)%g.length;renderLb();}
function lbSetIdx(i){lbIdx=i;renderLb();}
document.addEventListener('keydown',function(e){
  var open=document.getElementById('lightbox').classList.contains('open');
  if(e.key==='Escape'&&open) closeLb();
  if(!open) return;
  if(e.key==='ArrowRight') lbNav(1);
  if(e.key==='ArrowLeft') lbNav(-1);
});
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this&&document.getElementById('lightbox').classList.contains('open')) closeLb();});

// ── STATS
function updateStats(){
  var active=CLINICS.filter(function(c){return c.status!=='stopped';}).length;
  var docs=CLINICS.reduce(function(n,c){return n+c.sections.reduce(function(m,s){return m+s.doctors.length;},0);},0);
  var photos=Object.values(galleries).reduce(function(n,g){return n+g.length;},0);
  var cEl=document.getElementById('statClinics');if(cEl) cEl.textContent=active;
  var dEl=document.getElementById('statDoctors');if(dEl) dEl.textContent=docs+'+';
  var pEl=document.getElementById('statPhotos');if(pEl) pEl.textContent=photos;
}

// ── TOAST
var _tt=null;
function showToast(msg){
  var t=document.getElementById('toast');if(!t) return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3200);
}

boot();

</script>
